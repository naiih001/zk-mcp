services:
  - type: web
    name: zk-mcp
    env: node
    buildCommand: npm install && npm run build
    startCommand: node build/migrate.js && node build/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: zk-mcp-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: zk-mcp-db
    databaseName: zk_mcp
    plan: free
